name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so we can push back to main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          CARGO_VERSION="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          TAG="${{ github.ref_name }}"
          if [ "$CARGO_VERSION" != "$TAG" ]; then
            echo "ERROR: tag $TAG does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Run tests
        run: cargo test

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"

          # Retry until GitHub makes the tarball available (usually immediate)
          for i in $(seq 1 10); do
            SHA256=$(curl -fsSL "$URL" | shasum -a 256 | awk '{print $1}')
            [ -n "$SHA256" ] && break
            echo "Attempt $i: tarball not ready, retrying in 5s…"
            sleep 5
          done

          if [ -z "$SHA256" ]; then
            echo "ERROR: could not fetch tarball after retries"
            exit 1
          fi

          sed -i "s|url \"https://github.com.*\.tar\.gz\"|url \"${URL}\"|" Formula/zk-lsp.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/zk-lsp.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/zk-lsp.rb
          git commit -m "chore: update formula to ${TAG} [skip ci]"
          git push origin HEAD:main
